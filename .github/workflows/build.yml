name: Build HermesX Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v1.0.0)'
        required: true

env:
  HERMESX_REPO: ${{ secrets.HERMESX_REPO }}

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: windows-x64
            os: windows-latest
            triples: x86_64-pc-windows-msvc
          - target: macos-arm64
            os: macos-latest
            triples: aarch64-apple-darwin

    runs-on: ${{ matrix.os }}

    steps:
      - name: Clone private HermesX source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HERMESX_REPO }}
          token: ${{ secrets.HERMERSX_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}

      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build HermesX
        run: npm run build -- --target ${{ matrix.triples }}

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir -p release
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            find src-tauri/target -name "*.exe" -path "*/bundle/nsis/*" | while read f; do
              cp "$f" release/
              echo "Collected: $f"
            done
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            # DMG
            find src-tauri/target -name "*.dmg" -path "*/bundle/dmg/*" | while read f; do
              cp "$f" release/
              echo "Collected DMG: $f"
            done
            # Fallback: zip .app
            if [ ! "$(ls -A release/ 2>/dev/null)" ]; then
              APP_DIR=$(find src-tauri/target -name "*.app" -maxdepth 4 -type d | head -1)
              if [ -n "$APP_DIR" ]; then
                cd "$(dirname "$APP_DIR")" && zip -r "$GITHUB_WORKSPACE/release/HermesX-${{ matrix.target }}.zip" "$(basename "$APP_DIR")"
                echo "Zipped .app bundle"
              fi
            fi
          fi
          # Rename to canonical form: HermesX-{platform}-{version}.{ext}
          TAG=${GITHUB_REF#refs/tags/}
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=${{ github.event.inputs.tag }}
          fi
          TAG=${TAG#v}
          pushd release
          if [[ "${{ runner.os }}" == "Windows" ]]; then
            for f in *.exe; do
              mv "$f" "HermesX-win-${TAG}.exe" 2>/dev/null || true
            done
          elif [[ "${{ runner.os }}" == "macOS" ]]; then
            for f in *.dmg; do
              mv "$f" "HermesX-mac-${TAG}.dmg" 2>/dev/null || true
            done
          fi
          popd
          echo "=== Release contents ==="
          ls -la release/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HermesX-${{ matrix.target }}
          path: release/

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Determine release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG=${{ github.event.inputs.tag }}
          else
            TAG=${GITHUB_REF#refs/tags/}
          fi
          echo "TAG=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=${TAG#v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.TAG }}
          name: HermesX ${{ steps.tag.outputs.TAG }}
          body: |
            ## 📦 HermesX ${{ steps.tag.outputs.TAG }}

            ### 桌面端下载

            | 平台 | 文件 |
            |------|------|
            | 🪟 Windows x64 | `HermesX-win-${{ steps.tag.outputs.VERSION }}.exe` |
            | 🍎 macOS (M1–M4) | `HermesX-mac-${{ steps.tag.outputs.VERSION }}.dmg` |

            > ⚠️ macOS 首次打开若提示&#34;无法验证开发者&#34;，前往 **系统设置 → 隐私与安全性** 中点击&#34;仍要打开&#34;。
            > ⚠️ Windows 安装若 SmartScreen 拦截，点击&#34;更多信息 → 仍要运行&#34;。

            ---

            Built with [Tauri](https://tauri.app/) · HermesX © 2026
          files: release-artifacts/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Gitee sync disabled — uploads to China servers are too slow
      # - name: Sync to Gitee Release
      #   env:
      #     GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
      #   run: |
      #     TAG="${{ steps.tag.outputs.TAG }}"
      #     ...
